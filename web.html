<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecalux SCx Technical Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Chart Container Styling - Mandatory Requirements */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Tailwind max-w-xl is approx 576px, max-w-2xl is 672px. Using explicit 600px for safety */
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }

        /* Custom Scrollbar for sidebar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #94a3b8; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .nav-item.active {
            background-color: #0ea5e9; /* Sky 500 */
            color: white;
            border-right: 4px solid #0369a1; /* Sky 700 */
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <!-- Chosen Palette: Slate (Backgrounds/Text) + Sky/Blue (Mecalux Brand Identity) + Orange (Highlights/Safety) -->
    <!-- Application Structure Plan: 
         1. Layout: Sidebar Navigation (left) + Main Content Area (right).
         2. Sections: 
            - Overview: High-level metrics and general intro.
            - Mechanics: Structure types (Single/Double mast) and Extractors.
            - Architecture: Electrical cabinets map (+PO, +AE, +CU) and Network.
            - Perception: Sensors (BPS, Laser, Vision) with interactive simulation.
            - Energy: EffiSRS and Regeneration explanation with Canvas animation.
         3. Logic: Vanilla JS state management ('currentSection'). Data driven rendering from a 'reportData' object.
    -->
    <!-- Visualization & Content Choices:
         - Overview: Chart.js Radar chart for performance profiles.
         - Mechanics: Interactive cards for extractor types.
         - Architecture: Interactive HTML grid representing the physical layout of cabinets.
         - Perception: JS-driven slider to simulate BPS sensor readings.
         - Energy: HTML5 Canvas animation to visualize power flow (Regen vs Resistor).
    -->
    <!-- CONFIRMATION: NO SVG graphics used (FontAwesome font icons used instead). NO Mermaid JS used. -->
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center shadow-md z-20">
        <h1 class="text-xl font-bold tracking-tight"><i class="fa-solid fa-warehouse mr-2"></i>SCx Technical Hub</h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="bg-slate-900 text-slate-300 w-full md:w-64 flex-shrink-0 flex flex-col h-full absolute md:relative transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-10 shadow-xl">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-2xl font-bold text-white tracking-tight">Mecalux SCx</h1>
            <p class="text-xs text-sky-400 mt-1 uppercase tracking-wider">Technical Knowledge</p>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li>
                    <button onclick="app.navigate('overview')" class="nav-item w-full text-left px-6 py-3 hover:bg-slate-800 transition-colors flex items-center group">
                        <i class="fa-solid fa-chart-line w-6 group-hover:text-white transition-colors"></i>
                        <span class="font-medium">Overview</span>
                    </button>
                </li>
                <li>
                    <button onclick="app.navigate('mechanics')" class="nav-item w-full text-left px-6 py-3 hover:bg-slate-800 transition-colors flex items-center group">
                        <i class="fa-solid fa-gears w-6 group-hover:text-white transition-colors"></i>
                        <span class="font-medium">Mechanics & Structure</span>
                    </button>
                </li>
                <li>
                    <button onclick="app.navigate('architecture')" class="nav-item w-full text-left px-6 py-3 hover:bg-slate-800 transition-colors flex items-center group">
                        <i class="fa-solid fa-network-wired w-6 group-hover:text-white transition-colors"></i>
                        <span class="font-medium">Control Architecture</span>
                    </button>
                </li>
                <li>
                    <button onclick="app.navigate('perception')" class="nav-item w-full text-left px-6 py-3 hover:bg-slate-800 transition-colors flex items-center group">
                        <i class="fa-solid fa-eye w-6 group-hover:text-white transition-colors"></i>
                        <span class="font-medium">Instrumentation</span>
                    </button>
                </li>
                <li>
                    <button onclick="app.navigate('energy')" class="nav-item w-full text-left px-6 py-3 hover:bg-slate-800 transition-colors flex items-center group">
                        <i class="fa-solid fa-bolt w-6 group-hover:text-white transition-colors"></i>
                        <span class="font-medium">Energy & Efficiency</span>
                    </button>
                </li>
            </ul>
        </div>

        <div class="p-4 border-t border-slate-700 bg-slate-950">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-sky-600 flex items-center justify-center text-white font-bold">E</div>
                <div>
                    <p class="text-sm font-semibold text-white">Engineer User</p>
                    <p class="text-xs text-slate-500">Mecalux Systems</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 h-full overflow-y-auto bg-slate-50 relative w-full" id="main-content">
        <!-- Content injected here via JS -->
    </main>

    <!-- JavaScript Logic -->
    <script>
        // --- 1. Data Store ---
        const reportData = {
            overview: {
                title: "System Overview",
                intro: "The Mecalux SCx (3rd Generation) is a high-performance mechatronic system designed for automated storage and retrieval of pallets in high-bay warehouses. It integrates advanced mechanical engineering with decentralized control logic.",
                metrics: [
                    { label: "Max Height", value: "45 m", icon: "fa-arrows-up-to-line", color: "bg-blue-100 text-blue-600" },
                    { label: "Max Load", value: "1500 kg", icon: "fa-weight-hanging", color: "bg-emerald-100 text-emerald-600" },
                    { label: "Travel Speed", value: "160 m/min", icon: "fa-gauge-high", color: "bg-orange-100 text-orange-600" },
                    { label: "Temp Range", value: "-30°C to +40°C", icon: "fa-temperature-half", color: "bg-indigo-100 text-indigo-600" }
                ],
                highlights: [
                    "Modular structure (Single or Double Mast).",
                    "Decentralized control architecture (+PO, +AE, +CU).",
                    "Energy regeneration capabilities.",
                    "Advanced diagnostics via DUE and Vision Systems."
                ]
            },
            mechanics: {
                title: "Mechanics & Structure",
                intro: "The structural backbone of the SCx series is classified by mast configuration and extractor type, adaptable to diverse warehouse heights and load requirements.",
                masts: [
                    { id: "single", title: "Single Mast (SC2 - SC5)", range: "Up to ~38 meters", desc: "Central column design ideal for standard loads and medium heights. Lightweight and agile." },
                    { id: "double", title: "Double Mast (SC6 - SC9)", range: "Up to 45 meters", desc: "Two columns joined by a top frame. High stability for heavy loads (1500kg+) and double-deep applications." }
                ],
                extractors: [
                    { type: "SD (Single Deep)", load: "1500 kg", desc: "Telescopic forks reaching one pallet depth. High speed handling." },
                    { type: "DD (Double Deep)", load: "1200-1500 kg", desc: "Extended reach forks for two-depth storage. Requires strict deflection analysis." },
                    { type: "APS (Shuttle)", load: "N/A", desc: "Automatic Pallet Shuttle carried by the cradle for high-density storage." }
                ]
            },
            architecture: {
                title: "Electrical & Control Architecture",
                intro: "To reduce wiring and latency, control is decentralized across three main cabinets communicating via wireless infrared links and Profinet.",
                cabinets: [
                    { id: "PO", name: "+PO (Aisle)", loc: "Fixed on Floor", func: "Interface with warehouse, main power, safety fencing.", icon: "fa-building" },
                    { id: "AE", name: "+AE (On-board)", loc: "Base of Machine", func: "Contains PLC (Brain), Inverters, Regen Modules, Comms.", icon: "fa-microchip" },
                    { id: "CU", name: "+CU (Cradle)", loc: "Lifting Carriage", func: "Controls forks, load sensors, weighing system.", icon: "fa-box-open" }
                ],
                network: {
                    plc: "Siemens S7-1500",
                    comms: "Infrared / Profinet",
                    middleware: "Galileo Software (Logic -> Physical Mapping)"
                }
            },
            perception: {
                title: "Instrumentation & Senses",
                intro: "Precision positioning and safety rely on a suite of optical and laser sensors, enabling millimetric accuracy.",
                sensors: [
                    { name: "BPS (Travel)", desc: "Barcode Positioning System. A laser reader on the crane reads a barcode tape on the floor for absolute X-axis positioning.", icon: "fa-barcode" },
                    { name: "Laser Rangefinder (Hoist)", desc: "Measures Z-axis distance by bouncing a laser beam off a top reflector.", icon: "fa-ruler-vertical" },
                    { name: "Weighing System", desc: "Load cells in the cradle to prevent overload. Calibrated via pattern weights during commissioning.", icon: "fa-weight-scale" },
                    { name: "Vision (Mobotix)", desc: "Dual cameras record 25s clips (15s pre-buffer + 10s post) during faults.", icon: "fa-video" }
                ]
            },
            energy: {
                title: "Energy & Efficiency",
                intro: "The SCx series maximizes efficiency through hardware regeneration and smart software algorithms.",
                features: [
                    { title: "Regeneration", desc: "Hardware module in +AE returns braking energy to the grid instead of burning it as heat." },
                    { title: "EffiSRS Algorithm", desc: "Synchronizes X and Y axes to use regenerative braking energy from one axis to power the other immediately." },
                    { title: "DUE", desc: "Diagnostic unit monitoring brake wear (air gap) to predict maintenance needs." }
                ]
            }
        };

        // --- 2. State Management ---
        const app = {
            state: {
                currentSection: 'overview',
                simulationRunning: false,
                bpsPosition: 0,
                bpsCode: "000000"
            },
            
            init: function() {
                this.navigate('overview');
                
                // Mobile menu toggle
                document.getElementById('mobile-menu-btn').addEventListener('click', () => {
                    const sidebar = document.getElementById('sidebar');
                    sidebar.classList.toggle('-translate-x-full');
                });
            },

            navigate: function(sectionId) {
                this.state.currentSection = sectionId;
                
                // Update Sidebar UI
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('active');
                });
                // Find button with onclick matching
                const activeBtn = Array.from(document.querySelectorAll('.nav-item')).find(el => el.getAttribute('onclick').includes(sectionId));
                if(activeBtn) activeBtn.classList.add('active');

                // Close mobile menu if open
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                    sidebar.classList.add('-translate-x-full');
                }

                // Render Content
                const container = document.getElementById('main-content');
                container.innerHTML = ''; // Clear
                
                switch(sectionId) {
                    case 'overview': this.renderOverview(container); break;
                    case 'mechanics': this.renderMechanics(container); break;
                    case 'architecture': this.renderArchitecture(container); break;
                    case 'perception': this.renderPerception(container); break;
                    case 'energy': this.renderEnergy(container); break;
                }
            },

            // --- RENDERERS ---

            renderOverview: function(container) {
                const data = reportData.overview;
                
                const metricsHtml = data.metrics.map(m => `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4 hover:shadow-md transition-shadow">
                        <div class="w-12 h-12 rounded-full ${m.color} flex items-center justify-center text-xl">
                            <i class="fa-solid ${m.icon}"></i>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500 font-medium">${m.label}</p>
                            <p class="text-2xl font-bold text-slate-800">${m.value}</p>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="p-8 max-w-7xl mx-auto fade-in">
                        <header class="mb-8">
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                            <p class="text-lg text-slate-600 mt-2 max-w-3xl">${data.intro}</p>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                            ${metricsHtml}
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <!-- Performance Chart -->
                            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                <h3 class="text-lg font-bold text-slate-800 mb-4">Performance Profile</h3>
                                <div class="chart-container">
                                    <canvas id="performanceChart"></canvas>
                                </div>
                            </div>

                            <!-- Highlights -->
                            <div class="bg-slate-900 text-white p-6 rounded-xl shadow-lg">
                                <h3 class="text-lg font-bold mb-4 text-sky-400">Key Features</h3>
                                <ul class="space-y-4">
                                    ${data.highlights.map(h => `
                                        <li class="flex items-start">
                                            <i class="fa-solid fa-check text-emerald-400 mt-1 mr-3"></i>
                                            <span class="text-slate-300">${h}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                                <div class="mt-8 pt-6 border-t border-slate-700">
                                    <p class="text-sm text-slate-400 mb-2">System Generation</p>
                                    <div class="text-3xl font-bold text-white">SCx 3G</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Initialize Chart
                setTimeout(() => {
                    const ctx = document.getElementById('performanceChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Travel Speed (m/min)', 'Hoist Speed (m/min)', 'Accel (cm/s²)', 'Load x10 (kg)'],
                            datasets: [{
                                label: 'SCx Series Performance',
                                data: [160, 66, 40, 150], // Scaled values for visualization
                                backgroundColor: [
                                    'rgba(14, 165, 233, 0.6)',
                                    'rgba(14, 165, 233, 0.6)',
                                    'rgba(249, 115, 22, 0.6)',
                                    'rgba(16, 185, 129, 0.6)'
                                ],
                                borderColor: [
                                    'rgb(14, 165, 233)',
                                    'rgb(14, 165, 233)',
                                    'rgb(249, 115, 22)',
                                    'rgb(16, 185, 129)'
                                ],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) {
                                                label += ': ';
                                            }
                                            if (context.parsed.y !== null) {
                                                if(context.label.includes('Load')) return "1500 kg";
                                                if(context.label.includes('Accel')) return "0.4 m/s²";
                                                return context.parsed.y;
                                            }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: { color: '#f1f5f9' }
                                }
                            }
                        }
                    });
                }, 100);
            },

            renderMechanics: function(container) {
                const data = reportData.mechanics;
                
                const extractorsHtml = data.extractors.map(e => `
                    <div class="bg-white p-5 rounded-lg border border-slate-200 hover:border-sky-500 transition-colors cursor-default group">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-slate-800 group-hover:text-sky-600 transition-colors">${e.type}</h4>
                            <span class="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded font-mono">${e.load}</span>
                        </div>
                        <p class="text-sm text-slate-600">${e.desc}</p>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="p-8 max-w-7xl mx-auto fade-in">
                        <header class="mb-8">
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                            <p class="text-lg text-slate-600 mt-2 max-w-3xl">${data.intro}</p>
                        </header>

                        <!-- Mast Types -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                            ${data.masts.map(m => `
                                <div class="bg-white rounded-xl shadow-sm border-t-4 ${m.id === 'single' ? 'border-sky-500' : 'border-indigo-500'} p-6">
                                    <div class="flex items-center justify-between mb-4">
                                        <h3 class="text-xl font-bold text-slate-800">${m.title}</h3>
                                        <i class="fa-solid fa-up-down-left-right text-2xl text-slate-300"></i>
                                    </div>
                                    <div class="mb-4">
                                        <span class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Height Range</span>
                                        <p class="text-2xl font-bold text-slate-900">${m.range}</p>
                                    </div>
                                    <p class="text-slate-600">${m.desc}</p>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Extractors Section -->
                        <div class="bg-slate-50 border border-slate-200 rounded-xl p-8">
                            <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                                <i class="fa-solid fa-hand-holding-box mr-3 text-orange-500"></i>
                                Extractor Systems
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                ${extractorsHtml}
                            </div>
                        </div>
                        
                        <!-- Visual representation placeholder -->
                        <div class="mt-8 text-center text-slate-400 text-sm">
                            <i class="fa-solid fa-ruler-combined mr-2"></i> All dimensions are subject to HBP (Height Under Truss) constraints.
                        </div>
                    </div>
                `;
            },

            renderArchitecture: function(container) {
                const data = reportData.architecture;

                container.innerHTML = `
                    <div class="p-8 max-w-7xl mx-auto fade-in">
                        <header class="mb-8">
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                            <p class="text-lg text-slate-600 mt-2 max-w-3xl">${data.intro}</p>
                        </header>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                            <!-- Interactive Cabinet Map -->
                            <div class="lg:col-span-2">
                                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                                    <h3 class="text-lg font-bold text-slate-800 mb-6">Cabinet Topology (Interactive)</h3>
                                    
                                    <!-- Diagram -->
                                    <div class="relative h-64 bg-slate-50 rounded-lg border border-dashed border-slate-300 p-4 flex items-center justify-center space-x-4 md:space-x-12">
                                        
                                        <!-- PO -->
                                        <div onclick="app.showCabinet('PO')" class="cursor-pointer group flex flex-col items-center">
                                            <div class="w-24 h-32 bg-slate-800 rounded-lg shadow-lg flex items-center justify-center border-b-4 border-orange-500 group-hover:-translate-y-1 transition-transform">
                                                <i class="fa-solid fa-building text-3xl text-white"></i>
                                            </div>
                                            <div class="mt-2 font-bold text-slate-700">+PO</div>
                                            <div class="text-xs text-slate-500">Aisle</div>
                                        </div>

                                        <!-- Connection -->
                                        <div class="flex-1 h-1 bg-slate-300 relative">
                                            <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-xs text-slate-400 font-mono">
                                                Infrared / Profinet
                                            </div>
                                            <i class="fa-solid fa-wifi absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-slate-400 bg-slate-50 px-1"></i>
                                        </div>

                                        <!-- AE -->
                                        <div onclick="app.showCabinet('AE')" class="cursor-pointer group flex flex-col items-center">
                                            <div class="w-24 h-24 bg-sky-600 rounded-lg shadow-lg flex items-center justify-center border-b-4 border-sky-800 group-hover:-translate-y-1 transition-transform relative">
                                                <i class="fa-solid fa-microchip text-3xl text-white"></i>
                                                <!-- Connection to CU -->
                                                <div class="absolute -bottom-8 left-1/2 w-1 h-8 bg-slate-300"></div>
                                            </div>
                                            <div class="mt-2 font-bold text-slate-700">+AE</div>
                                            <div class="text-xs text-slate-500">On-board</div>
                                        </div>

                                        <!-- CU (Below AE visually in concept, but side by side here for flex layout, let's adjust structure) -->
                                        <!-- Let's represent AE and CU stacked or close -->
                                    </div>

                                    <!-- CU separate display connected to AE logic -->
                                    <div class="flex justify-center mt-2 pl-32 md:pl-48">
                                         <div onclick="app.showCabinet('CU')" class="cursor-pointer group flex flex-col items-center">
                                            <div class="w-20 h-20 bg-emerald-600 rounded-lg shadow-lg flex items-center justify-center border-b-4 border-emerald-800 group-hover:-translate-y-1 transition-transform">
                                                <i class="fa-solid fa-box-open text-2xl text-white"></i>
                                            </div>
                                            <div class="mt-2 font-bold text-slate-700">+CU</div>
                                            <div class="text-xs text-slate-500">Cradle</div>
                                        </div>
                                    </div>
                                    
                                    <p class="text-center text-sm text-slate-400 mt-6">Click a cabinet to view details</p>
                                </div>
                            </div>

                            <!-- Detail Panel -->
                            <div id="cabinet-detail" class="bg-slate-900 text-white p-6 rounded-xl shadow-lg flex flex-col justify-center">
                                <div class="text-center">
                                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-sky-400">
                                        <i class="fa-solid fa-info"></i>
                                    </div>
                                    <h3 class="text-xl font-bold mb-2">Select a Cabinet</h3>
                                    <p class="text-slate-400 text-sm">Click on the diagram to see the internal components and function of each control node.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Network Info -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="bg-white p-4 rounded-lg border border-slate-200">
                                <h4 class="font-bold text-slate-700 mb-2">Brain (PLC)</h4>
                                <p class="text-sm text-slate-600">${data.network.plc}</p>
                            </div>
                            <div class="bg-white p-4 rounded-lg border border-slate-200">
                                <h4 class="font-bold text-slate-700 mb-2">Communication</h4>
                                <p class="text-sm text-slate-600">${data.network.comms}</p>
                            </div>
                            <div class="bg-white p-4 rounded-lg border border-slate-200">
                                <h4 class="font-bold text-slate-700 mb-2">Middleware</h4>
                                <p class="text-sm text-slate-600">${data.network.middleware}</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            showCabinet: function(id) {
                const cabinet = reportData.architecture.cabinets.find(c => c.id === id);
                const panel = document.getElementById('cabinet-detail');
                
                panel.innerHTML = `
                    <div class="fade-in">

            renderPerception: function(container) {

                            <div class="space-y-4">
                                ${data.sensors.map(s => `

                                        <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-sky-600 flex-shrink-0">
                                            <i class="fa-solid ${s.icon}"></i>
                                        </div>
                                        <div>
                                            <h4 class="font-bold text-slate-800">${s.name}</h4>
                                            <p class="text-sm text-slate-600 mt-1">${s.desc}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <!-- Interactive Simulator -->
                            <div class="bg-slate-900 rounded-xl p-6 text-white shadow-xl">
                                <h3 class="font-bold mb-4 flex items-center">
                                    <i class="fa-solid fa-gamepad mr-2 text-orange-500"></i> BPS Simulator
                                </h3>
                                <p class="text-sm text-slate-400 mb-6">Drag the slider to move the crane and observe how the Barcode Positioning System (BPS) reads absolute coordinates.</p>
                                
                                <!-- Simulation Visualization -->
                                <div class="relative h-20 bg-slate-800 rounded border border-slate-700 mb-6 overflow-hidden">
                                    <!-- Barcode Tape -->
                                    <div class="absolute top-0 left-0 w-full h-full opacity-20" style="background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, #fff 2px, #fff 4px);"></div>
                                    <!-- Laser Reader -->
                                    <div id="sim-laser" class="absolute top-0 h-full w-1 bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)] transition-all duration-75" style="left: 0%"></div>
                                    <!-- Crane Icon -->
                                    <div id="sim-crane" class="absolute top-1/2 -translate-y-1/2 transition-all duration-75" style="left: 0%">
                                        <i class="fa-solid fa-dolly text-sky-400 text-2xl -ml-3"></i>

                                </div>

                                <!-- Controls -->
                                <div class="mb-6">
                                    <input type="range" min="0" max="100" value="0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500" oninput="app.updateBPSSim(this.value)">

                                <!-- Readout -->
                                <div class="grid grid-cols-2 gap-4">

                                        <div class="text-xs text-slate-500 mb-1">BARCODE ID</div>
                                        <span id="sim-code">BC-00-A</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                         <!-- Vision System Mock -->
                         <div class="bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700">
                            <div class="bg-slate-950 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                                <span class="text-xs font-bold text-slate-300"><i class="fa-solid fa-video mr-2"></i>Mobotix S16 - Event Recorder</span>
                                <span class="text-xs text-emerald-400 flex items-center"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mr-2"></span> Buffer Active</span>
                            </div>
                            <div class="p-8 text-center">
                                <div class="inline-flex items-center space-x-8 text-slate-500">
                                    <div class="flex flex-col items-center">
                                        <div class="w-16 h-1 bg-slate-600 mb-2"></div>
                                        <span class="text-xs">Pre-Event (-15s)</span>
                                    </div>
                                    <div class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-red-500/50">
                                        <i class="fa-solid fa-triangle-exclamation"></i>
                                    </div>
                                    <div class="flex flex-col items-center">
                                        <div class="w-16 h-1 bg-slate-600 mb-2"></div>
                                        <span class="text-xs">Post-Event (+10s)</span>
                                    </div>
                                </div>
                                <p class="mt-6 text-slate-400 text-sm max-w-lg mx-auto">
                                    The system continuously buffers video. When a fault occurs (Trigger), it permanently saves the surrounding 25 seconds for diagnosis.
                                </p>

                         </div>
                    </div>
                `;
            },

            updateBPSSim: function(val) {
                const laser = document.getElementById('sim-laser');
                const crane = document.getElementById('sim-crane');
                const coord = document.getElementById('sim-coord');
                const code = document.getElementById('sim-code');

                if(laser && crane) {
                    laser.style.left = val + '%';
                    crane.style.left = val + '%';
                    
                    // Simulated logic
                    const mm = Math.round(val * 450); // Max 45m = 45000mm, scaled down
                    coord.innerText = (mm * 10).toString().padStart(5, '0') + " mm";
                    
                    // Simulate code changing every 10%
                    const segment = Math.floor(val / 10);
                    const chars = "ABCDEFGHIJK";
                    code.innerText = `BC-0${segment}-${chars[segment]}`;
                }
            },

            renderEnergy: function(container) {
                const data = reportData.energy;

                container.innerHTML = `
                    <div class="p-8 max-w-7xl mx-auto fade-in h-full flex flex-col">
                        <header class="mb-6 flex-shrink-0">
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                            <p class="text-lg text-slate-600 mt-2 max-w-3xl">${data.intro}</p>
                        </header>

                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8 flex-shrink-0">
                            ${data.features.map(f => `
                                <div class="bg-white p-5 rounded-lg border-l-4 border-sky-500 shadow-sm">
                                    <h4 class="font-bold text-slate-800 mb-2">${f.title}</h4>
                                    <p class="text-sm text-slate-600">${f.desc}</p>
                                </div>
                            `).join('')}
                        </div>

                        <!-- Energy Canvas Animation -->
                        <div class="flex-1 bg-slate-900 rounded-xl shadow-2xl border border-slate-700 p-4 relative flex flex-col min-h-[400px]">
                            <div class="flex justify-between items-center mb-4 z-10">
                                <h3 class="text-white font-bold"><i class="fa-solid fa-bolt text-yellow-400 mr-2"></i>Energy Flow Simulation</h3>
                                <div class="flex space-x-2 bg-slate-800 rounded p-1">
                                    <button onclick="app.setEnergyMode('regen')" id="btn-regen" class="px-3 py-1 text-xs rounded bg-sky-600 text-white font-bold transition-all">Regenerative (+AE)</button>
                                    <button onclick="app.setEnergyMode('resistor')" id="btn-resistor" class="px-3 py-1 text-xs rounded hover:bg-slate-700 text-slate-300 transition-all">Resistor (Standard)</button>
                                </div>
                            </div>
                            
                            <canvas id="energyCanvas" class="absolute top-0 left-0 w-full h-full rounded-xl"></canvas>
                            
                            <!-- Legend -->
                            <div class="absolute bottom-4 left-4 z-10 bg-slate-900/80 backdrop-blur p-3 rounded border border-slate-700 text-xs text-slate-300">
                                <div class="flex items-center mb-1"><span class="w-3 h-3 rounded-full bg-yellow-400 mr-2"></span> Energy Packet</div>
                                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> Heat Dissipation</div>
                            </div>
                        </div>
                    </div>
                `;

                // Start Animation
                setTimeout(() => {
                    this.initEnergyCanvas();
                }, 100);
            },

            // --- ENERGY CANVAS LOGIC ---
            energyMode: 'regen',
            particles: [],
            canvasContext: null,
            canvasWidth: 0,
            canvasHeight: 0,
            animationFrame: null,

            setEnergyMode: function(mode) {
                this.energyMode = mode;
                // Update UI
                const btnRegen = document.getElementById('btn-regen');
                const btnResistor = document.getElementById('btn-resistor');
                if(btnRegen && btnResistor) {
                    if(mode === 'regen') {
                        btnRegen.className = "px-3 py-1 text-xs rounded bg-sky-600 text-white font-bold transition-all";
                        btnResistor.className = "px-3 py-1 text-xs rounded hover:bg-slate-700 text-slate-300 transition-all";
                    } else {
                        btnResistor.className = "px-3 py-1 text-xs rounded bg-orange-600 text-white font-bold transition-all";
                        btnRegen.className = "px-3 py-1 text-xs rounded hover:bg-slate-700 text-slate-300 transition-all";
                    }
                }
            },

            initEnergyCanvas: function() {
                const canvas = document.getElementById('energyCanvas');
                if (!canvas) return;
                
                const ctx = canvas.getContext('2d');
                this.canvasContext = ctx;
                
                // Resize
                const parent = canvas.parentElement;
                canvas.width = parent.clientWidth;
                canvas.height = parent.clientHeight;
                this.canvasWidth = canvas.width;
                this.canvasHeight = canvas.height;

                this.particles = [];
                if(this.animationFrame) cancelAnimationFrame(this.animationFrame);
                this.animateEnergy();
            },

            animateEnergy: function() {
                const ctx = this.canvasContext;
                const w = this.canvasWidth;
                const h = this.canvasHeight;
                
                if(!ctx) return;

                // Clear
                ctx.fillStyle = '#0f172a'; // Slate 900
                ctx.fillRect(0, 0, w, h);

                // Draw Components (Nodes)
                const motorX = w * 0.2;
                const driveX = w * 0.5;
                const gridX = w * 0.8;
                const resistorY = h * 0.3; // Above drive
                const centerY = h * 0.6;

                // Draw Lines
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 4;
                
                // Motor -> Drive
                ctx.beginPath();
                ctx.moveTo(motorX, centerY);
                ctx.lineTo(driveX, centerY);
                ctx.stroke();

                if (this.energyMode === 'regen') {
                    // Drive -> Grid
                    ctx.beginPath();
                    ctx.moveTo(driveX, centerY);
                    ctx.lineTo(gridX, centerY);
                    ctx.stroke();
                } else {
                    // Drive -> Resistor
                    ctx.beginPath();
                    ctx.moveTo(driveX, centerY);
                    ctx.lineTo(driveX, resistorY);
                    ctx.stroke();
                }

                // Draw Icons/Nodes
                this.drawNode(ctx, motorX, centerY, 'Motor (Braking)', '#64748b');
                this.drawNode(ctx, driveX, centerY, 'Drive / Inverter', '#0ea5e9'); // Sky
                
                if (this.energyMode === 'regen') {
                     this.drawNode(ctx, gridX, centerY, 'Electrical Grid', '#10b981'); // Emerald
                } else {
                     this.drawNode(ctx, driveX, resistorY, 'Resistor', '#f97316'); // Orange
                }

                // Spawn Particles (Energy Packets)
                if (Math.random() < 0.05) {
                    this.particles.push({
                        x: motorX,
                        y: centerY,
                        target: 'drive',
                        progress: 0,
                        speed: 0.01 + Math.random() * 0.01,
                        color: '#facc15' // Yellow
                    });
                }

                // Update Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    
                    // Logic flow
                    if (p.target === 'drive') {
                        p.x += (driveX - motorX) * p.speed;
                        if (p.x >= driveX) {
                            p.x = driveX;
                            if (this.energyMode === 'regen') p.target = 'grid';
                            else p.target = 'resistor';
                        }
                    } else if (p.target === 'grid') {
                        p.x += (gridX - driveX) * p.speed;
                        if (p.x >= gridX) this.particles.splice(i, 1);
                    } else if (p.target === 'resistor') {
                        p.y -= (centerY - resistorY) * p.speed;
                        if (p.y <= resistorY) {
                            // Turn into heat (red) and fade
                            p.color = '#ef4444';
                            p.target = 'heat';
                            p.life = 1.0;
                        }
                    } else if (p.target === 'heat') {
                        p.y -= 1;
                        p.x += (Math.random() - 0.5) * 2;
                        p.life -= 0.05;
                        if(p.life <= 0) this.particles.splice(i, 1);
                    }

                    // Draw Particle
                    ctx.globalAlpha = p.life || 1;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                this.animationFrame = requestAnimationFrame(() => this.animateEnergy());
            },

            drawNode: function(ctx, x, y, label, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#94a3b8';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, y + 40);
            }
        };

        // Start App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        // Window resize handler for canvas
        window.addEventListener('resize', () => {
            if(app.state.currentSection === 'energy') {
                app.initEnergyCanvas();
            }
        });

    </script>
